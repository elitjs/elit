name: Auto PackCode

on:
  push:
    tags:
      - 'v*'  # Trigger เมื่อมีการสร้าง tag เช่น v1.0.0

permissions:
  contents: read
  id-token: write  # จำเป็นสำหรับ --provenance (ดึง OIDC token จาก GitHub)

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'elitjs/elit' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # เพื่อให้เข้าถึง tag ได้

      - name: Compute version and dist-tag
        run: |
          PACKAGE_VERSION=${GITHUB_REF#refs/tags/}
          echo "TAG_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

          VERSION_NO_V="${PACKAGE_VERSION#v}"
          VERSION_NO_BUILD="${VERSION_NO_V%%+*}"
          if [[ "$VERSION_NO_BUILD" == *"-"* ]]; then
            PRERELEASE="${VERSION_NO_BUILD#*-}"
            DIST_TAG="${PRERELEASE%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "DIST_TAG=$DIST_TAG" >> $GITHUB_ENV

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'  # เขียน NODE_AUTH_TOKEN ลง .npmrc ให้ publish ได้
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Publish all packages (topological order)
        run: |
          echo "Publishing all packages at ${{ env.TAG_VERSION }} (tag: ${{ env.DIST_TAG }})"
          node scripts/publish-all.mjs "${{ env.TAG_VERSION }}" "${{ env.DIST_TAG }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
