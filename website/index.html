<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elit.js — Reactive web, desktop, and native from one source</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="description" content="Elit.js is a TypeScript-first reactive framework for building web, desktop, native, and WAPK apps. One VNode tree, many runtimes.">
    <meta name="og:title" content="Elit.js">
    <meta name="og:description" content="Reactive web, desktop, and native from one source.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        (function () {
            try {
                var s = localStorage.getItem('elit-theme');
                var t = (s === 'dark' || s === 'light')
                    ? s
                    : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
                document.documentElement.dataset.theme = t;
            } catch (e) {
                document.documentElement.dataset.theme = 'dark';
            }
        })();
    </script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
